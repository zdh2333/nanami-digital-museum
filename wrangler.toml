# Downloaded Pages settings were reviewed against the existing project before
# adding guestbook-only bindings. The project name and custom domains remain
# unchanged in Cloudflare Pages.
name = "nanami-digital-museum"
pages_build_output_dir = "./dist"
compatibility_date = "2026-07-17"

[[d1_databases]]
binding = "DB"
database_name = "nanami-guestbook"
database_id = "f5e228bb-8bfa-43e6-980c-70bdf4d1dbd0"
migrations_dir = "./migrations"

[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "nanami-guestbook-photos"

[[services]]
binding = "IMAGE_SANITIZER"
service = "nanami-image-sanitizer"

[vars]
# This is a public Turnstile site key, intentionally committed so the Vite
# production build can render the widget. It is not a server credential.
VITE_TURNSTILE_SITE_KEY = "0x4AAAAAAD34l0QAtjJvwGlX"
TURNSTILE_EXPECTED_HOSTNAMES = "nanamicat.com,www.nanamicat.com,nanami-digital-museum.pages.dev"
TURNSTILE_EXPECTED_ACTION = "guestbook-write"
